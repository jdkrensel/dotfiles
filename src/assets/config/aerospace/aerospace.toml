config-version = 2
after-startup-command = []
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30
default-root-container-layout = 'accordion'
default-root-container-orientation = 'horizontal'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
    preset = 'colemak'

[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

[mode.main.binding]
    alt-slash = 'layout accordion tiles horizontal vertical'

    # Focus (n=left, e=down, i=up, o=right; comma/period=dfs-prev/next)
    alt-n = 'focus left'
    alt-e = 'focus down'
    alt-i = 'focus up'
    alt-o = 'focus right'
    alt-comma = 'focus dfs-prev'
    alt-period = 'focus dfs-next'

    # Move
    alt-shift-n = 'move left'
    alt-shift-e = 'move down'
    alt-shift-i = 'move up'
    alt-shift-o = 'move right'

    alt-f = 'fullscreen'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'

    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
    alt-shift-semicolon = 'mode service'

[workspace-to-monitor-force-assignment]
    1 = 'built-in'
    2 = 'dell'
    3 = 'rog'

[[on-window-detected]]
if.app-id = 'com.cmuxterm.app'
run = 'layout floating'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-n = ['join-with left', 'mode main']
    alt-shift-e = ['join-with down', 'mode main']
    alt-shift-i = ['join-with up', 'mode main']
    alt-shift-o = ['join-with right', 'mode main']
